name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Build
        run: bash build.sh

      - name: Upload binary (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: quickTerminal-${{ github.sha }}
          path: quickTerminal
          retention-days: 7
